<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Collector Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="start-screen overlay-card" id="startScreen">
            <div class="overlay-inner">
                <h1>🎉 Dino Collector 🎉</h1>
                <p>Collect every shiny item, dodge the hazards, and beat your best time.</p>
                <button id="startButton">Start Adventure</button>
            </div>
        </div>

        <div class="game-ui" id="gameUI">
            <canvas id="gameCanvas" width="900" height="560"></canvas>
            <div class="ui">
                <div class="score-display stat-card">Score: <span id="score">0</span></div>
                <div class="time-display stat-card">Time: <span id="time">0.0</span>s</div>
                <div class="objects-left stat-card">Items Left: <span id="objectsLeft">10</span></div>
            </div>
            <div class="touch-hint">Move with arrow keys, WASD, or swipe on mobile.</div>
        </div>

        <div class="game-over-screen overlay-card" id="gameOverScreen">
            <div class="overlay-inner">
                <h1 id="resultTitle">Game Over</h1>
                <p id="resultMessage">You hit an obstacle. Try again!</p>
                <p>Your Score: <span id="finalScore">0</span></p>
                <p>Time: <span id="finalTime">0.0</span>s</p>
                <button id="restartButton">Play Again</button>
            </div>
        </div>
    </div>

    <audio id="collectSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-bonus-alert-767.mp3" preload="auto"></audio>
    <audio id="obstacleSound" src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3" preload="auto"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-small-group-cheer-and-applause-518.mp3" preload="auto"></audio>

    <script src="game.js"></script>
</body>
</html>
